name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v5

      # Fail early if the tag doesn't match Cargo.toml — avoids shipping
      # a binary whose `--version` disagrees with the tag name.
      - name: Verify tag matches workspace version
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml -Raw
          if ($content -notmatch '(?s)\[workspace\.package\].*?version\s*=\s*"([^"]+)"') {
            Write-Error "could not find workspace version in Cargo.toml"
            exit 1
          }
          $cargoVersion = $matches[1]
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "tag=$tagVersion  cargo=$cargoVersion"
          if ($cargoVersion -ne $tagVersion) {
            Write-Error "tag $tagVersion does not match Cargo.toml $cargoVersion — bump Cargo.toml before tagging"
            exit 1
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --workspace --target x86_64-pc-windows-msvc

      - name: Package portable zip
        shell: pwsh
        run: |
          $staging = "airtalk-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\airtalk.exe" $staging
          Copy-Item "target\x86_64-pc-windows-msvc\release\airtalk-core.exe" $staging
          Copy-Item "target\x86_64-pc-windows-msvc\release\airtalk-cli.exe" $staging
          Copy-Item "LICENSE" $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"

      - name: Upload portable
        uses: actions/upload-artifact@v5
        with:
          name: windows-portable
          path: airtalk-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

      - name: Build installer
        shell: pwsh
        run: |
          $env:AIRTALK_VERSION = "${{ github.ref_name }}" -replace '^v', ''
          iscc installer\airtalk.iss

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: airtalk-*-x86_64-windows-setup.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: airtalk-*
