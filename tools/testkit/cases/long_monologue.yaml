# Stress ASR on a continuous long utterance (no pauses). VAD should
# keep it as a single segment; CER should stay low even at length.
name: long_monologue
voice: zh-CN-XiaoxiaoNeural

segments:
  - say: >
      人工智能语音识别技术近年来取得了长足的进步。从早期基于隐马尔可夫
      模型的系统，到如今的深度神经网络架构，识别准确率已经达到了相当高
      的水平。然而，在真实场景中仍然存在许多挑战，比如口音差异、背景
      噪声、专业术语以及方言的处理。研究人员正在探索更加鲁棒的模型
      架构，希望能够覆盖更多的使用场景。

core:
  vad: true
  no_llm: true

expect:
  segments_emitted: 1
  raw_cer_max: 0.10
  raw_must_contain: ["人工智能", "神经网络", "方言"]
  language: zh
