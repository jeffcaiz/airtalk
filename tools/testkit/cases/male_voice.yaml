# Cover speaker variation. All other cases use `zh-CN-XiaoxiaoNeural`
# (female); YunxiNeural is a male voice with different formant
# structure. ASR should be speaker-agnostic but worth pinning.
name: male_voice
voice: zh-CN-YunxiNeural

segments:
  - say: "使用男声来测试识别器对不同嗓音的适应性。"
  - silence: 900
  - say: "Qwen3-ASR 在说话人变化时应保持稳定表现。"

core:
  vad: true
  no_llm: true

expect:
  segments_emitted: 2
  raw_cer_max: 0.15
  raw_must_contain: ["男声", "识别"]
  language: zh
