name: with_white_noise
voice: zh-CN-XiaoxiaoNeural

segments:
  - say: "在白噪声背景下测试语音识别。"
  - silence: 900
  - say: "看看嘈杂环境中的表现如何。"

noise:
  kind: white
  rms: 0.005      # ~-46 dBFS: quiet room ambience

core:
